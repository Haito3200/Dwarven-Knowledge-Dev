 DA_Blueprint_event.100.t:0 "Unusable Blueprint"
 DA_Blueprint_event.100.d:0 "We can't work with this, it is too deteriorated."

############### runic blueprint ###################
# 26 lines is fine

 DA_Blueprint_event.101.t:0 "§OBlueprint: §! Wand of Magic Missile"
 DA_Blueprint_event.101.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nThe Wand create three glowing darts of magical force. Each dart strikes a creature of the user's choice that they can see within range."

 DA_Blueprint_event.102.t:0 "§OBlueprint: §! Staff of Mage Armor"
 DA_Blueprint_event.102.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA sturdy staff which allows the casting of the spell mage armor a few times a day"

 DA_Blueprint_event.103.t:0 "§OBlueprint: §! Staff of Shield"
 DA_Blueprint_event.103.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA sturdy staff which allows the casting of the spell Shield a few times a day"

 DA_Blueprint_event.104.t:0 "§OBlueprint: §! Runic Cannon"
 DA_Blueprint_event.104.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA standard Artillery unit redesigned to have runes applied on it."

 DA_Blueprint_event.105.t:0 "§OBlueprint: §! Wand of Scorching Ray"
 DA_Blueprint_event.105.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA sturdy wand which allows the casting of the spell Shield a few times a day"

 DA_Blueprint_event.106.t:0 "§OBlueprint: §! Runic Googles"
 DA_Blueprint_event.106.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nArcane lenses mounted in a brass frame lined with detection runes. They allow the wearer to see hidden enchantments, track heat signatures, and perceive magical illusions."

 DA_Blueprint_event.107.t:0 "§OBlueprint: §! Runic Battering Ram"
 DA_Blueprint_event.107.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA heavy mechanical ram engraved with impact-enhancing runes. When activated, it channels kinetic force outward, smashing through gates and barriers with supernatural ease."

 DA_Blueprint_event.108.t:0 "§OBlueprint: §! MAM-I"
 DA_Blueprint_event.108.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nAlso known as Multi Ammunition Musket. It is designed to be able to load and fire enchanted ammunitions or normal bullets.\nThis Musket has +1 to damage and attack rolls. You can switch between these 2 modes as a bonus action:\n\nReapetaing Shot: it will automatically create normal bullets and load them as they get used. it works the same as Repeating Shot\nCustom bullets: On the side of the musket there are 5 quick access ammunitions, Mage Hand automatically loads the next bullet upon firing. Upon using all quick access bullets, you must use a bonus action to add another row of 5 bullets to the side and 1 in the chamber ( or just switch to repeating shots)\nDamage	1d12 plus DEX ( plus ammunition) \nRange	18 / 90 m\nProperties	Two-Handed\nMastery	Slow\nRequired Spells : Mage Hand\n\nRequired Plan : Repeating Shot\n\nBonus/Ability : If loaded with a normal bullet, this weapon deals 1d12 + DEX damage. This weapon uses the same bullets as those made for normal muskets or pistols."

 DA_Blueprint_event.109.t:0 "§OBlueprint: §! Rune Blade"
 DA_Blueprint_event.109.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA finely forged sword whose edge is lined with glowing sigils. The runes empower each strike with elemental energy—fire, frost, lightning, or whatever the wielder attunes to."

 DA_Blueprint_event.110.t:0 "§OBlueprint: §! MAP-I"
 DA_Blueprint_event.110.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nAlso known as Multi Ammunition Pistol. It is designed to be able to load and fire enchanted ammunitions or normal bullets.\nThis Pistol has +1 to damage and attack rolls. You can switch between these 2 modes as a bonus action:\n\nReapetaing Shot: it will automatically create normal bullets and load them as they get used. it works the same as Repeating Shot\nCustom bullets: On the side of the Pistol there are 4 quick access ammunitions, Mage Hand automatically loads the next bullet upon firing. Upon using all quick access bullets, you must use a bonus action to add another row of 4 bullets to the side and 1 in the chamber ( or just switch to repeating shots)\nDamage	1d10 + DEX (+ ammunition)\nRange	12 / 60 m\nProperties	one-Handed\nMastery	Slow\nRequired Spells : Mage Hand\n\nRequired Plan : Repeating Shot\n\nBonus/Ability : If loaded with a normal bullet, this weapon deals 1d10 + DEX damage. This weapon uses the same bullets as those made for normal muskets or pistols."

 DA_Blueprint_event.111.t:0 "§OBlueprint: §! MASF-I"
 DA_Blueprint_event.111.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA very heavy sniper rifle, specialized for long range use. Regardless of the amount of attacks you can make each turn, this weapon can only be used once in a turn. You have disadvantage on attack rolls made with this weapon to target creatures within 9 meters of you. You need to use a bonus action to reload it.\n\nDamage	4d4 + DEX + ammunition\nRange	60 / 240 m\nProperties	Two-Handed Loading\nMastery	Slow\nRequired Spells : Chromatic Orb , Elementalism\n\nBonus/Ability : If loaded with a normal bullet, this weapon deals 3d6 + DEX damage. This weapon needs custom MASF ammunitions, different from muskets and pistols. the ammunitions must be made separately."

 DA_Blueprint_event.112.t:0 "§OBlueprint: §! Runic Tower Shield"
 DA_Blueprint_event.112.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA massive, rune-shielded bulwark of steel and stone. When planted, it can generate a protective dome of arcane energy large enough for allies to shelter behind."

 DA_Blueprint_event.113.t:0 "§OBlueprint: §! Runic Pike"
 DA_Blueprint_event.113.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA long spear reinforced with spell-etched metal. The runic core allows the wielder to extend the weapon's reach with a burst of energy or discharge lightning on impact."

 DA_Blueprint_event.114.t:0 "§OBlueprint: §! Simplified Homunculus"
 DA_Blueprint_event.114.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA small, vat-grown assistant made of alchemical clay and bound arcane essence. Though less intelligent than full homunculi, it follows simple commands with loyal precision."

 DA_Blueprint_event.115.t:0 "§OBlueprint: §! Staff of mending"
 DA_Blueprint_event.115.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA sturdy staff which allows its user to cast the mending cantrip at will. It also deals quite a bit of damage if used as a weapon."

 DA_Blueprint_event.116.t:0 "§OBlueprint: §! Runic Ballista"
 DA_Blueprint_event.116.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA siege engine reinforced with glowing runestones. Its bolts fly farther and strike harder than any mundane ballista, carrying elemental payloads upon impact."

 DA_Blueprint_event.117.t:0 "§OBlueprint: §! Runic Basilisk"
 DA_Blueprint_event.117.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA magically forged, serpentine construct with rune-lit eyes. Its gaze doesn't petrify outright, but temporarily stiffens armor, joints, and even mechanical parts."


 DA_Blueprint_event.140.t:0 "§OBlueprint: §! Defender Golem"
 DA_Blueprint_event.140.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nRating: B      Rune Slots: 0\n\nCost: 10        Tech Tier: Militarized Runes (I)\n\nUnit Type: Infantry and Cavalry      Unique Modifier: Golem\n\nTechs Required: \n - §RProject§! §YGolem Core§!\n - §oTechnology§! §YAlchemy I§!\n - §oTechnology§! §YArcane Arts I§!\n - §oTechnology§! §YMechanics I§!\n\nA Humanoid Silhuette powered by a 'Golem Core', a Damestear Crystal surrounded by many runes which operate the golem, distributing the magical energy to move the necessary limbs remotely. Having it operate autonomously is currently impossible and an operator must be deployed nearby to command it efficiently.\nAs a golem, it is not able to use firearms of any kind and is restricted to melee fighting.\nThis Golem boasts fairly high defensive capabilities, but it has little to no attack power."

 DA_Blueprint_event.141.t:0 "§OBlueprint: §! Assault Golem"
 DA_Blueprint_event.141.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nRating: B      Rune Slots: 0\n\nCost: 10        Tech Tier: Militarized Runes (I)\n\nUnit Type: Infantry and Cavalry      Unique Modifier: Golem\n\nTechs Required: \n - §RProject§! §YGolem Core§!\n - §oTechnology§! §YAlchemy I§!\n - §oTechnology§! §YArcane Arts I§!\n - §oTechnology§! §YMechanics I§!\n\nA Humanoid Silhuette powered by a 'Golem Core', a Damestear Crystal surrounded by many runes which operate the golem, distributing the magical energy to move the necessary limbs remotely. Having it operate autonomously is currently impossible and an operator must be deployed nearby to command it efficiently.\nAs a golem, it is not able to use firearms of any kind and is restricted to melee fighting.\nThis Golem boasts fairly high offensive capabilities, but it has little to no defensive power."

 DA_Blueprint_event.142.t:0 "§OBlueprint: §! ClockWork Limbs"
 DA_Blueprint_event.142.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nMechanical arm or leg replacements powered by gears, springs, and minor enchantments. They grant enhanced strength, stability, or dexterity depending on their craftsmanship."

 DA_Blueprint_event.143.t:0 "§OBlueprint: §! ClockWork Gyro Lance"
 DA_Blueprint_event.143.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA precision-balanced lance with internal gyroscopes. Its self-stabilizing mechanism allows devastating charges and perfectly aligned thrusts even at high speed."

 DA_Blueprint_event.144.t:0 "§OBlueprint: §! ClockWork Gauntlets"
 DA_Blueprint_event.144.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nBrass-and-steel gauntlets driven by miniature gearworks. They amplify the wearer’s grip and punching force, often humming with the whirr of arcane power."

 DA_Blueprint_event.145.t:0 "§OBlueprint: §! ClockWork Iron-Watch"
 DA_Blueprint_event.145.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA humanoid sentry forged from iron plates and internal gearworks. Programmed to patrol and defend, it marches tirelessly with glowing ocular lenses that detect intruders."

 DA_Blueprint_event.146.t:0 "§OBlueprint: §! ClockWork repeating crossbow"
 DA_Blueprint_event.146.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA mechanical crossbow featuring an auto-feeding bolt magazine. Each crank winds the firing mechanism, enabling rapid, near-continuous fire."

 DA_Blueprint_event.147.t:0 "§OBlueprint: §! ClockWork Siege Loader"
 DA_Blueprint_event.147.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA squat, heavy-limbed machine built to lift and load ammunition for siege engines. Its piston-driven arms can hoist massive projectiles with effortless precision."

 DA_Blueprint_event.148.t:0 "§OBlueprint: §! ClockWork Recoil Dampener Harness"
 DA_Blueprint_event.148.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA chest-and-back harness lined with shock-absorption springs and runic stabilizers. It reduces recoil from heavy weapons, allowing the wearer to fire without staggering."

 DA_Blueprint_event.149.t:0 "§OBlueprint: §! ClockWork Stonebreaker"
 DA_Blueprint_event.149.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA hammer-like tool reinforced with internal impact multipliers. When swung, its head delivers concentrated kinetic force capable of shattering stone or breaching fortifications."

 DA_Blueprint_event.150.t:0 "§OBlueprint: §! ClockWork Bulwark Sentinel"
 DA_Blueprint_event.150.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA towering defensive automaton equipped with a shield-like carapace. When stationed, it plants its legs and becomes an immovable guardian, projecting protective barriers for allies."

 DA_Blueprint_event.151.t:0 "§OBlueprint: §! ClockWork Golem"
 DA_Blueprint_event.151.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA massive construct powered by complex clockwork cores and sustained by binding enchantments. Strong, obedient, and tireless, it serves as a frontline juggernaut on the battlefield."

 DA_Blueprint_event.152.t:0 "§OBlueprint: §! Explosive Javelin"
 DA_Blueprint_event.152.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nRating: B+      Rune Slots: 1\n\nCost: 6        Tech Tier: Militarized Runes (I)\n\nUnit Type: Infantry and Cavalry      Unique Modifier: Explosive\n\nTechs Required: \n - §RProject§! §YExplosives§!\n - §oTechnology§! §YAlchemy I§!\n - §oTechnology§! §YArcane Arts I§!\n - §oTechnology§! §YMechanics I§!\n\n"

 DA_Blueprint_event.153.t:0 "§OBlueprint: §! Explosive Arbalest"
 DA_Blueprint_event.153.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nRating: B      Rune Slots: 1\n\nCost: 6        Tech Tier: Militarized Runes (I)\n\nUnit Type: Infantry and Cavalry      Unique Modifier: Explosive\n\nTechs Required: \n - §RProject§! §YExplosives§!\n - §oTechnology§! §YAlchemy I§!\n - §oTechnology§! §YArcane Arts I§!\n\n"

 DA_Blueprint_event.154.t:0 "§OBlueprint: §! Explosive Hand Cannon"
 DA_Blueprint_event.154.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nRating: B+      Rune Slots: 1\n\nCost: 6        Tech Tier: Militarized Runes (I)\n\nUnit Type: Infantry and Cavalry      Unique Modifier: Explosive\n\nTechs Required: \n - §RProject§! §YExplosives§!\n - §oTechnology§! §YAlchemy I§!\n - §oTechnology§! §YArcane Arts I§!\n - §oTechnology§! §YMechanics I§!\n\n"

 DA_Blueprint_event.155.t:0 "§OBlueprint: §! Explosive Throwing Knife"
 DA_Blueprint_event.155.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nRating: B+      Rune Slots: 1\n\nCost: 6        Tech Tier: Militarized Runes (I)\n\nUnit Type: Infantry and Cavalry      Unique Modifier: Explosive\n\nTechs Required: \n - §RProject§! §YExplosives§!\n - §oTechnology§! §YAlchemy I§!\n - §oTechnology§! §YArcane Arts I§!\n - §oTechnology§! §YMechanics I§!\n\n"

############### steam blueprint ###################

 DA_Blueprint_event.200.t:0 "§OBlueprint: §! Steam Amulet of Versatility"
 DA_Blueprint_event.200.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA brass amulet with tiny pressure vents and rotating sigils. When activated, it redirects steam-infused magic to enhance strength, reaction time, or elemental resistance depending on the wearer's needs."

 DA_Blueprint_event.201.t:0 "§OBlueprint: §! Steam-Powered Exosuits"
 DA_Blueprint_event.201.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nRating: A-      Rune Slots: 1\n\nCost: 13        Tech Tier: Advanced Runes (II)\n\nUnit Type: Infantry      Unique Modifier: None\n\nTechs Required: \n - §oTechnology§! §YAlchemy I§!\n - §oTechnology§! §YArcane Arts II§!\n - §oTechnology§! §YMechanics II§!\n\nPersonalized mechanical suits with integrated runes, providing dwarven soldiers with enhanced strength and agility on the battlefield. These exosuits also offer protection against enemy attacks."

 DA_Blueprint_event.202.t:0 "§OBlueprint: §! Steam-Powered Deepforge Cannon"
 DA_Blueprint_event.202.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA massive, furnace-charged cannon built for subterranean warfare. It fires superheated slag shells capable of melting metal plating and carving tunnels through dense rock."

 DA_Blueprint_event.203.t:0 "§OBlueprint: §! Steam-Powered Drill Spears"
 DA_Blueprint_event.203.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nLong spears tipped with rotating drill-heads. Powered by compact steam reservoirs, they spin at high velocity, piercing armor, shields, and even thick carapaces with ease."

 DA_Blueprint_event.204.t:0 "§OBlueprint: §! Steam-Powered MAM-II"
 DA_Blueprint_event.204.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA reinforced musket with interchangeable steam-pressurized cartridges. It can cycle between elemental rounds, shrapnel bursts, or concussive blasts with a simple lever shift."

 DA_Blueprint_event.205.t:0 "§OBlueprint: §! Steam-Powered MAP-II"
 DA_Blueprint_event.205.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA compact handgun with a rotating multi-chamber reservoir. Despite its size, it delivers a variety of specialized shots—ice, fire, impact, or smoke—at high efficiency."

 DA_Blueprint_event.206.t:0 "§OBlueprint: §! Steam-Powered MASF-II"
 DA_Blueprint_event.206.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA long-barreled precision rifle stabilized by dual steam-jets. Its specialized cartridges allow long-range elemental shots that retain velocity and accuracy over incredible distances."

 DA_Blueprint_event.240.t:0 "§OBlueprint: §! Steam Defender Golem"
 DA_Blueprint_event.240.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nRating: A-      Rune Slots: 1\n\nCost: 14        Tech Tier: Advanced Runes (II)\n\nUnit Type: Infantry and Cavalry      Unique Modifier: Golem\n\nTechs Required: \n - §RProject§! §YGolem Core§!\n - §oTechnology§! §YArcane Arts II§!\n - §oTechnology§! §YMechanics II§!\n\nA Humanoid Silhuette powered by a 'Golem Core', a Damestear Crystal surrounded by many runes which operate the golem, distributing the magical energy to move the necessary limbs remotely. Having it operate autonomously is currently impossible and an operator must be deployed nearby to command it efficiently.\nAs a golem, it is not able to use firearms of any kind and is restricted to melee fighting.\nThis Golem boasts fairly high defensive capabilities, but it has little to no attack power."

 DA_Blueprint_event.241.t:0 "§OBlueprint: §! Steam Assault Golem"
 DA_Blueprint_event.241.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nRating: A-      Rune Slots: 1\n\nCost: 14        Tech Tier: Advanced Runes (II)\n\nUnit Type: Infantry and Cavalry      Unique Modifier: Golem\n\nTechs Required: \n - §RProject§! §YGolem Core§!\n - §oTechnology§! §YAlchemy II§!\n - §oTechnology§! §YArcane Arts II§!\n - §oTechnology§! §YMechanics II§!\n\nA Humanoid Silhuette powered by a 'Golem Core', a Damestear Crystal surrounded by many runes which operate the golem, distributing the magical energy to move the necessary limbs remotely. Having it operate autonomously is currently impossible and an operator must be deployed nearby to command it efficiently.\nAs a golem, it is not able to use firearms of any kind and is restricted to melee fighting.\nThis Golem boasts fairly high offensive capabilities, but it has little to no defensive power."

 DA_Blueprint_event.242.t:0 "§OBlueprint: §! ClockWork Steam Exoskeleton"
 DA_Blueprint_event.242.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA lighter, hybrid frame combining clockwork gears with steam pistons. It allows agile movement with short bursts of enhanced strength, ideal for scouts, sappers, and rapid-strike units."

 DA_Blueprint_event.243.t:0 "§OBlueprint: §! ClockWork Steam Bolter"
 DA_Blueprint_event.243.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA rugged weapon with clockwork feed mechanisms and a steam-pressure firing chamber. It launches heavy, rune-tipped bolts at blistering speeds, each shot releasing a puff of hissing steam."

 DA_Blueprint_event.244.t:0 "§OBlueprint: §! ClockWork Steam Gauntlets"
 DA_Blueprint_event.244.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nHeavily plated gauntlets powered by miniature boilers and gear-driven impact modulators. They deliver explosive punches and can vent controlled steam jets for propulsion or defense."

 DA_Blueprint_event.245.t:0 "§OBlueprint: §! ClockWork Steam Tanks"
 DA_Blueprint_event.245.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nHeavily armored war machines driven by synchronized gearworks and steam furnaces. Their churning treads and rotating turret assemblies allow them to traverse hostile terrain while unleashing devastating shell fire."

 DA_Blueprint_event.246.t:0 "§OBlueprint: §! ClockWork Steam Bombard"
 DA_Blueprint_event.246.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA colossal, steam-pressurized siege cannon mounted on reinforced struts. Its internal boiler compresses force into each shot, launching explosive shells that can level fortifications in a single thunderous blast."

 DA_Blueprint_event.247.t:0 "§OBlueprint: §! ClockWork Steam Ballista"
 DA_Blueprint_event.247.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA mechanized ballista whose limbs are tensioned by clockwork springs and steam pistons. It rapid-fires massive bolts—some fitted with runic payloads—far quicker than traditional siege engines."

 DA_Blueprint_event.248.t:0 "§OBlueprint: §! Steam-Vehicle: Driller"
 DA_Blueprint_event.248.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA rugged, tunneling machine sporting a massive rotating drillhead. Designed for subterranean traversal, it can carve through stone while shielding its crew within a reinforced steam-cooled cockpit."

 DA_Blueprint_event.249.t:0 "§OBlueprint: §! Steam-Vehicle: Runesteel Ravager"
 DA_Blueprint_event.249.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA swift, armored assault vehicle plated in magically infused runesteel. Steam thrusters along its flanks provide burst propulsion, letting it ram, slice, or overrun enemies with brutal efficiency."

 DA_Blueprint_event.250.t:0 "§OBlueprint: §! Steam-Vehicle: Forgefire Fury"
 DA_Blueprint_event.250.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA flame-belching war rig powered by a roaring internal furnace. Its front-mounted combustor projects torrents of molten fire, turning battlefield chokepoints into blazing death zones."

 DA_Blueprint_event.251.t:0 "§OBlueprint: §! Steam-Arcanomech: Vanguard"
 DA_Blueprint_event.251.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA towering mech suit combining steam hydraulics with arcane stabilizers. Designed for frontline combat, it wields oversized weapons and projects barrier fields fueled by runic capacitors."

 DA_Blueprint_event.252.t:0 "§OBlueprint: §! Steam-Arcanomech: Holder"
 DA_Blueprint_event.252.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA defensive arcanomech built to anchor a battle line. Its reinforced plating and shield generators allow it to absorb incoming fire, while arm-mounted clamps and anchors can immobilize enemy constructs or beasts."

 DA_Blueprint_event.253.t:0 "§OBlueprint: §! Bio-construct: Abomination"
 DA_Blueprint_event.253.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA grotesque fusion of reconstituted flesh, bone plating, and alchemical tendons. Fueled by unstable life-essence cores, it fights with feral strength and disturbing resilience."

 DA_Blueprint_event.254.t:0 "§OBlueprint: §! Bio-construct: Living Armor"
 DA_Blueprint_event.254.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA symbiotic suit formed from enchanted organic material. It bonds to a wearer, hardening in response to threats and reshaping itself instinctively—offering unmatched protection at the cost of eerie, semi-sentient behavior."

 DA_Blueprint_event.255.t:0 "§OBlueprint: §! Bio-construct: Chimera"
 DA_Blueprint_event.255.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA lab-grown hybrid beast formed from spliced monster genomes and alchemical grafting. It sports mismatched heads, reinforced muscles, and adaptive organs that shift to counter threats."

 DA_Blueprint_event.256.t:0 "§OBlueprint: §! Bio-construct: Purple Worm"
 DA_Blueprint_event.256.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA titanic, bio-engineered tunneler bred from arcane worm tissue. Its armored hide pulses with toxic enzymes, and it burrows through earth with terrifying speed, devouring everything in its path."

 DA_Blueprint_event.257.t:0 "§OBlueprint: §! Bio-construct: Ram"
 DA_Blueprint_event.257.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA heavily muscled, horn-plated creature grown for siege impact. Its bones are reinforced with alchemical alloys, letting it smash through barricades or enemy lines with unstoppable momentum."

############### electric blueprint ###################

 DA_Blueprint_event.300.t:0 "§OBlueprint: §! Electric Armor"
 DA_Blueprint_event.300.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA sleek suit lined with conductive mesh and arcane capacitors. It generates controlled electric fields that shock attackers, boost reflexes, or create short-range electromagnetic barriers."

 DA_Blueprint_event.301.t:0 "§OBlueprint: §! Electric Automatic artillery"
 DA_Blueprint_event.301.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA turreted weapon system powered by conductive coils and lightning cores. It fires rapid, electrically charged shells capable of stunning constructs or blasting through heavy plating."

 DA_Blueprint_event.302.t:0 "§OBlueprint: §! Electric Multi Casting Wand: Fire Shield"
 DA_Blueprint_event.302.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA conduit-wand topped with a crackling energy prism. At the wielder's command, it releases a rotating sequence of spells—primarily a protective halo of charged fire that burns and repels enemies."

 DA_Blueprint_event.303.t:0 "§OBlueprint: §! Electric Multi Casting Staff: Ice Storm"
 DA_Blueprint_event.303.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA long staff wrapped in metal-tuned channels. It cycles through frost-based incantations, culminating in a devastating, electrically enhanced ice storm that freezes targets and shatters armor with conductive hail."

 DA_Blueprint_event.304.t:0 "§OBlueprint: §! Electric Amulet of Undying"
 DA_Blueprint_event.304.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA charged talisman embedded with a self-renewing lightning core. When the wearer falls, stored energy jolts their body back to life, restoring them with a surge of revitalizing electricity."

 DA_Blueprint_event.340.t:0 "§OBlueprint: §! Defender Automata"
 DA_Blueprint_event.340.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA shield-bearing construct built for protection and crowd control. Reinforced with conductive plating, it emits static barriers and intercepts hostile projectiles with flawless mechanical timing."

 DA_Blueprint_event.341.t:0 "§OBlueprint: §! Assault Automata"
 DA_Blueprint_event.341.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA fast, aggressive combat machine equipped with shock-blades and spark-launchers. Designed to overwhelm foes with relentless, electrically enhanced melee strikes."

 DA_Blueprint_event.342.t:0 "§OBlueprint: §! Clock-Electric Exoskeleton"
 DA_Blueprint_event.342.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA hybrid frame of gears, pistons, and conductive coils. Steam-driven motion is amplified by electric surges, granting the wearer bursts of speed, power, and lightning-charged strikes."

 DA_Blueprint_event.343.t:0 "§OBlueprint: §! Clock-Electric Staff of Conjure Construct"
 DA_Blueprint_event.343.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA staff built with rotating arcane gears and a lightning core. When activated, it projects blueprint-shaped sigil arrays that manifest temporary mechanical constructs to fight or labor at command."

 DA_Blueprint_event.344.t:0 "§OBlueprint: §! Clock-Electric Gauntlets"
 DA_Blueprint_event.344.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nHeavily plated gauntlets with conductive knuckles and internal dynamo wheels. Punches release crackling bursts of electricity, and the gauntlets can magnetically deflect metal projectiles."

 DA_Blueprint_event.345.t:0 "§OBlueprint: §! Clockwork Dragon"
 DA_Blueprint_event.345.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA massive mechanical beast forged from enchanted steel plates and clockwork internals. Its wings unfold with gear-driven precision, and its breath weapon is a focused blast of scalding steam or lightning arcs depending on configuration."

 DA_Blueprint_event.346.t:0 "§OBlueprint: §! Clock-Electric Storm Engine Battery"
 DA_Blueprint_event.346.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA portable power core encased in brass shielding. Its spinning induction coils gather ambient storm energy, converting it into raw electrical charge to power weapons, constructs, or defensive nodes."

 DA_Blueprint_event.347.t:0 "§OBlueprint: §! Clock-Electric Ballista"
 DA_Blueprint_event.347.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA siege launcher whose limbs are pulled by clockwork torsion and energized by electric overdrive coils. Its bolts strike with shattering force, often detonating with lightning discharge on impact."

 DA_Blueprint_event.348.t:0 "§OBlueprint: §! Tesla Portable Railgun"
 DA_Blueprint_event.348.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA long, sleek weapon built with twin magnetic rails and a rechargeable lightning capacitor. It fires hyper-accelerated metal slugs that pierce armor and leave trails of crackling electricity in their wake."

 DA_Blueprint_event.349.t:0 "§OBlueprint: §! Tesla Shocking Warhammer"
 DA_Blueprint_event.349.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA heavy hammer crowned with a Tesla coil head. Each swing builds charge within the coil, releasing thunderous electric detonations on impact that can stun or obliterate targets."

 DA_Blueprint_event.350.t:0 "§OBlueprint: §! Tesla Suit"
 DA_Blueprint_event.350.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA full-body armored suit threaded with conductive circuitry and micro-coils. It surrounds the wearer in a protective electric field, enhances agility through electromotive boosts, and can unleash short-range shockwaves."

 DA_Blueprint_event.351.t:0 "§OBlueprint: §! Tesla Culverin"
 DA_Blueprint_event.351.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nA semi-stationary heavy weapon using electrified rails and a rotating capacitor drum. It fires high-velocity explosive shells infused with lightning, ideal for anti-vehicle or anti-construct combat."

 DA_Blueprint_event.352.t:0 "§OBlueprint: §! Tesla Railgun"
 DA_Blueprint_event.352.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nThe larger battlefield version of the railgun platform. It uses massive induction coils and reinforced barrel to launch massive balls of steel at supersonic speeds, generating shockwaves and electromagnetic bursts on every shot."

 DA_Blueprint_event.353.t:0 "§OBlueprint: §! Resonance Warhammers"
 DA_Blueprint_event.353.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nRating: A+      Rune Slots: 2\n\nCost: 22        Tech Tier: Runic Circuits (III)\n\nUnit Type: Infantry and Cavalry      Unique Modifier: Resonance\n\nTechs Required: \n - §RProject§! §YResonance§!\n - §oTechnology§! §YAlchemy II§!\n - §oTechnology§! §YArcane Arts III§!\n - §oTechnology§! §YMechanics III§!\n\nHighly advanced warhammer with high-level Runic circuits. High-frequency vibrations are released on contact allowing it to cut most things in existence."

 DA_Blueprint_event.354.t:0 "§OBlueprint: §! Resonance Wand of Shatter"
 DA_Blueprint_event.354.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nRating: A+      Rune Slots: 2\n\nCost: 22        Tech Tier: Runic Circuits (III)\n\nUnit Type: Infantry and Cavalry      Unique Modifier: Resonance\n\nTechs Required: \n - §RProject§! §YResonance§!\n - §oTechnology§! §YAlchemy II§!\n - §oTechnology§! §YArcane Arts III§!\n - §oTechnology§! §YMechanics III§!\n\nHighly advanced rifle with high-level Runic circuits allowing automatic fire. High-frequency vibrations are released by the bullet upon contact allowing it to pierce through most things in existence."

 DA_Blueprint_event.355.t:0 "§OBlueprint: §! Resonance Staff of Haste"
 DA_Blueprint_event.355.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nRating: A+      Rune Slots: 2\n\nCost: 23        Tech Tier: Runic Circuits (III)\n\nUnit Type: Infantry and Cavalry      Unique Modifier: Resonance\n\nTechs Required: \n - §RProject§! §YResonance§!\n - §oTechnology§! §YAlchemy II§!\n - §oTechnology§! §YArcane Arts III§!\n - §oTechnology§! §YMechanics III§!\n\nHighly advanced spear with high-level Runic circuits. High-frequency vibrations are released upon contact allowing it to pierce through most things in existence. It was made to be used by cavalry units, strangely enough, considering the fact that a tank is not as advanced as this spear, would't it have been a better choice to just make a tank?! I'm going mad ..."

 DA_Blueprint_event.356.t:0 "§OBlueprint: §! Resonance Throwing Spear"
 DA_Blueprint_event.356.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nRating: A+      Rune Slots: 2\n\nCost: 19        Tech Tier: Runic Circuits (III)\n\nUnit Type: Infantry and Cavalry      Unique Modifier: Resonance\n\nTechs Required: \n - §RProject§! §YResonance§!\n - §oTechnology§! §YAlchemy II§!\n - §oTechnology§! §YArcane Arts III§!\n - §oTechnology§! §YMechanics III§!\n\nA balanced spear with a vibro-core embedded in its shaft. Upon release, the weapon vibrates at increasing frequency, drilling through armor and generating a concussive burst as it impacts."

 DA_Blueprint_event.357.t:0 "§OBlueprint: §! Resonance Ballista"
 DA_Blueprint_event.357.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nRating: A+      Rune Slots: 2\n\nCost: 19        Tech Tier: Runic Circuits (III)\n\nUnit Type: Artillery      Unique Modifier: Resonance\n\nTechs Required: \n - §RProject§! §YResonance§!\n - §oTechnology§! §YAlchemy II§!\n - §oTechnology§! §YArcane Arts III§!\n - §oTechnology§! §YMechanics III§!\n\nA siege weapon reinforced with vibration dampeners and a Resonance amplifier. Its bolts launch with a thrumming shockwave, striking targets with devastating kinetic and vibrational impact that can shatter stone walls."

 DA_Blueprint_event.358.t:0 "§OBlueprint: §! Arcanomech: Annihilator"
 DA_Blueprint_event.358.d:0 "\n\n\n\n\n\n\n\n\n\n\n\nRating: S      Rune Slots: 2\n\nCost: 28        Tech Tier: Runic Circuits (III)\n\nUnit Type: Cavalry      Unique Modifier: Arcanomech\n\nTechs Required: \n - §RProject§! §YMotorization§!\n - §oTechnology§! §YAlchemy IV§!\n - §oTechnology§! §YArcane Arts III§!\n - §oTechnology§! §YMechanics IV§!\n\nA colossal war mech powered by arcane reactors and Resonance generators. Its arms mount vibro-blades and shock emitters, allowing it to tear through fortifications with ease. When its core overdrives, the entire frame becomes a walking quake, radiating destructive harmonics that obliterate anything caught nearby."


