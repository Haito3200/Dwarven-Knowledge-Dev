 DA_Blueprint_event.620.t:0 "§OSteam Blueprint: §! Mechanized Defender"
 DA_Blueprint_event.620.d:0 "A shielded, heavily plated mech-unit designed for frontline protection. Its frame features reinforced joints, a wide stance, and integrated barrier emitters. Built to engage threats head-on and shield allied units or puppets using stable power cores and defensive protocols."

 DA_Blueprint_event.621.t:0 "§OSteam Blueprint: §! Mechanized Vanguard"
 DA_Blueprint_event.621.d:0 "A fast-assault mechanized platform optimized for spearheading charges. Equipped with shock-resistant plating and boosted actuators, it excels at breaking enemy lines, supporting aggressive puppets, and sustaining momentum during prolonged combat."

 DA_Blueprint_event.622.t:0 "§OSteam Blueprint: §! Mechanized Knight"
 DA_Blueprint_event.622.d:0 "A balanced combat construct designed with honor-code algorithms and melee excellence. It wields integrated melee weapons, enhanced articulation for precision strikes, and an internal virtue-core that boosts resilience when defending allies or objectives."

