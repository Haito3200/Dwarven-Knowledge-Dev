 DA_Blueprint_event.520.t:0 "§OBlueprint: §! Cursed Staff of Hex"
 DA_Blueprint_event.520.d:0 "A twisted blackwood staff wrapped in whispering shadow-bindings. When wielded, it projects malignant curses that cling to enemies, warping their luck, weakening their resolve, and inviting misfortune."

 DA_Blueprint_event.521.t:0 "§OBlueprint: §! Cursed Swords of Withering"
 DA_Blueprint_event.521.d:0 "Paired blades forged from blighted iron and engraved with necrotic runes. Their strikes drain vitality, causing flesh to decay and armor to rust as if rapidly aged by dark magic."

 DA_Blueprint_event.522.t:0 "§OBlueprint: §! Cursed staff of Ray of Sickeness"
 DA_Blueprint_event.522.d:0 "A staff crowned with a sickly green focus gem that pulses like a diseased heart. It releases bolts of toxic energy capable of inflicting nausea, weakness, and virulent corruption."

 DA_Blueprint_event.523.t:0 "§OBlueprint: §! Cursed Death Armor"
 DA_Blueprint_event.523.d:0 "A grim suit of armor forged in ritualized shadowfire. It bonds to its wearer, amplifying their strength and resilience while slowly leeching their life essence. Enemies feel death’s chill as they approach its aura."

 DA_Blueprint_event.524.t:0 "§OBlueprint: §! Cursed Wand of Ray of Enfeeblement"
 DA_Blueprint_event.524.d:0 "A bone-like wand etched with siphoning sigils. It emits tendrils of withering magic that sap strength, leaving foes trembling, drained, and barely able to lift their weapons."

 DA_Blueprint_event.525.t:0 "§OBlueprint: §! Holy Armor"
 DA_Blueprint_event.525.d:0 "A radiant suit of sanctified metal that gleams with inner light. It shields the wearer with divine protection, repelling corruption and reducing the force of incoming attacks with celestial grace."

 DA_Blueprint_event.526.t:0 "§OBlueprint: §! Holy Healing Totems"
 DA_Blueprint_event.526.d:0 "Wooden or stone totems carved with luminous runes and blessed symbols. When planted, they emit warm waves of restorative energy that mend wounds, cleanse ailments, and bolster ally morale."

 DA_Blueprint_event.527.t:0 "§OBlueprint: §! Consacrated Swords"
 DA_Blueprint_event.527.d:0 "Blades forged with purified steel and blessed by sacred ritual. They glow faintly in the presence of evil and strike with holy clarity, burning corruption and banishing dark energies."

 DA_Blueprint_event.528.t:0 "§OBlueprint: §! Holy Staff of Divine Smite"
 DA_Blueprint_event.528.d:0 "A golden staff topped with a crystal prism that channels divine power. When invoked, it unleashes focused beams of radiant energy capable of smiting undead, demons, and any creature of darkness."

 DA_Blueprint_event.529.t:0 "§OSpirit Puppet:§! Low-Tier Fire Spirit"
 DA_Blueprint_event.529.d:0 "The Low-Tier Spirit is contained in a decent quality damestear core. When linked to a puppet, it grants the construct the ability to generate bursts of heat, ignite its strikes, and momentarily surge its movement with fiery propulsion. Unstable but energetic, ideal for aggressive light fighters."

 DA_Blueprint_event.530.t:0 "§OSpirit Puppet:§! Low-Tier Water Spirit"
 DA_Blueprint_event.530.d:0 "The Low-Tier Spirit is contained in a decent quality damestear core. Puppets attuned to it gain enhanced flexibility, limited self-repair through moisture regeneration, and the ability to produce pressurized water jets or slippery defensive veils. Best suited for adaptive or evasive constructs."

 DA_Blueprint_event.531.t:0 "§OSpirit Puppet:§! Low-Tier Air Spirit"
 DA_Blueprint_event.531.d:0 "The Low-Tier Spirit is contained in a decent quality damestear core. When channeled through a puppet, it provides increased speed, enhanced jumping or gliding, and slicing gust-based attacks. Excellent for reconnaissance puppets or fast skirmishers."

 DA_Blueprint_event.532.t:0 "§OSpirit Puppet:§! Low-Tier Earth Spirit"
 DA_Blueprint_event.532.d:0 "The Low-Tier Spirit is contained in a decent quality damestear core. Puppets empowered by it gain boosted durability, steadier footing, and the ability to deliver weighty, concussive blows or raise small earthen shields. Perfect for frontline or defensive puppet models."

 DA_Blueprint_event.534.t:0 "§OSpirit Puppet:§! Low-Tier Shadow Spirit"
 DA_Blueprint_event.534.d:0 "The Low-Tier Spirit is contained in a decent quality damestear core. When linked to a puppet, it grants the ability to blur its outline, soften footsteps, and project faint shadow lashes. Excellent for ambush units or distraction puppets, though its power is subtle and limited."

