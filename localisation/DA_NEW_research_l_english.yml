 DA_General_Research_events.11.t:0 "Warforged Infantry"
 DA_General_Research_events.11.d:0 "The quality of dwarven weapons is a testament to the meticulous craftsmanship and unparalleled skill that define dwarven blacksmithing. Forged deep within the heart of impenetrable mountain fortresses, these weapons embody the very essence of durability, precision, and artistry.\nDwarven weapons are renowned for their exceptional sharpness and resilience. The edges are honed to perfection, capable of cleaving through armor with unmatched precision. The weight and balance of these weapons are a result of centuries of refinement, ensuring that each swing is a harmonious dance of power and control."
 DA_General_Research_events.11.a:0 "Excellent"

 DA_General_Research_events.12.t:0 "Warforged Cavalry"
 DA_General_Research_events.12.d:0 "Warforged Cavalry, a unit renowned for their strict training, unparalleled discipline, and mastery of exotic and magical metals. Clad in enchanted armor forged from rare and mystical alloys, each Juggernaut is a formidable sight on the battlefield, exuding resilience and strength. Mounted on robust steeds donning magically fortified armor, the unit embodies an unstoppable force.\nThe Warforged Cavalry wield weapons adorned with elemental runes or enchantments, delivering devastating blows depending of the combination used. Their diverse array of exotic metals enhances their weaponry, making them a unique and powerful presence on the front lines. Recruits undergo rigorous training, mastering physical conditioning, weapon skills, and tactical drills from a young age, forging a cohesive and disciplined unit that stands as a symbol of dwarven might."
 DA_General_Research_events.12.a:0 "Excellent"

 DA_General_Research_events.13.t:0 "Warforged Artillery"
 DA_General_Research_events.13.d:0 ""
 DA_General_Research_events.13.a:0 "Excellent"

