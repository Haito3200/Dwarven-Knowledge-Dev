 DA_Secret_Societies_interface_on_Seekers_of_Perfection_desc:0 "One of the last Precursor elves still alive, this mad scientist stayed holed up in his own private flying laboratory and did not respond to the Call of Reflexion. Obsessed with creating the ultimate being, he ended up experimenting on his own body , and eventually he began creating clones of himself, which are collectively called the Seekers of Perfection. They interfere little with the mundane world, mostly roaming around and collecting interesting specimen to incorporate unto themselves in their endless quest of research, experiments, mutation and cloning. "

 DA_Secret_Societies_interface_on_Pioneer_Society_desc:0 "An offshoot of the Gommo, they are genius inventors wholly dedicated to their craft, tinkering and engineering just about anything, following their hearts. They ended up splitting off when the upper management started cutting their funding over ethical concerns regarding the potential uses of their inventions. Now getting money through clients with little regards for the morality of their more lethal creations, these cutting-edge mechanics are  now free to develop both wondrous and terrifying mechanisms. "

 DA_Secret_Societies_interface_on_Hammers_of_Halanna_desc:0 "Some people are born with a special connection to Halann itself. This usually translate to a deep understanding and passion of all things of the earth, especially minerals and metals. This makes them master smiths, capable of making impossible alloys and shaping weapons and tools out of even the strongest of metals. Gentle by nature, they can sense the presence of others like them, and so they tend to congregate in small, hidden communities all around Halann to avoid being exploited for their natural talents. "

 DA_Secret_Societies_interface_on_Hermetic_order_desc:0 "When a highly talented mage peer deep into the arcanes, sometimes they stumble upon strange arcane symbols. Among them, the true geniuses manage to understand their uses and complete the associated rituals. The next morning, a group of mage appears and take them away, to join the true masters of magic. Nobody knows how the Grandmaster of the Order managed to imbue his test into the very fabric of magic itself, and being accepted into the order and receive his teachings is an honor reserved only for the brightest magical minds. "

 DA_Secret_Societies_interface_on_Brotherhood_of_the_Skull_desc:0 "To know life, you must first know death.\nNamed after their founder, who became a lich through a modified ritual that ensured he wouldn't last more than a day, in order to unravel the mysteries of death and leave behind a record of his understanding  for his followers. Their profound knowledge of life and death makes them extremely adept doctors, and while the proximity of their studies with necromancy have made them somewhat outcasts, they provide healing to all who come to them. Learning their teachings however is reserved to those who renounce secular life to devote themselves to the brotherhood. "
